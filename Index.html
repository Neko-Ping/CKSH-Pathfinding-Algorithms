        function buildReverseGraph(g) {
            const rg = {};
            for (const v in g) rg[v] = {};
            for (const v in g) {
                for (const n in g[v].neighbors) {
                    rg[n][v] = g[v].neighbors[n];
                }
            }
            return rg;
        }

        const noElevatorGraph = {};
        for (const node in graph) {
            noElevatorGraph[node] = {
                x: graph[node].x,
                y: graph[node].y,
                z: graph[node].z,
                neighbors: {}
            };
            for (const neighbor in graph[node].neighbors) {
                // 核心邏輯：如果是跨樓層電梯，跳過不加進 neighbors
                const isVertexElevator = node.includes("電梯");
                const isNeighborElevator = neighbor.includes("電梯");
                
                if (isVertexElevator && isNeighborElevator) {
                    // 這裡判斷是否跨層，如果是跨層則不加入 neighbors
                    // 假設你的命名是 "一樓電梯", "二樓電梯"
                    const f1 = graph[node].z;
                    const f2 = graph[neighbor].z;
                    if (f1 !== f2) continue;
                }
                
                // 其他所有路徑（樓梯、平地、同層電梯到門口）都照抄
                noElevatorGraph[node].neighbors[neighbor] = graph[node].neighbors[neighbor];
            }
        }

        const reverseGraph = buildReverseGraph(graph);
        const reverseNoElevatorGraph = buildReverseGraph(noElevatorGraph);
        const reverseGraphLocal = buildReverseGraph(graph);

        // Optimized Priority Queue
        class PriorityQueue {
            constructor() {
                this.items = [];
                this.elementToIndex = new Map();
            }
            enqueue(element, priority) {
                const item = { element, priority };
                this.items.push(item);
                this.elementToIndex.set(element, this.items.length - 1);
                this.bubbleUp(this.items.length - 1);
            }
            bubbleUp(index) {
                while (index > 0) {
                    const parent = Math.floor((index - 1) / 2);
                    if (this.items[parent].priority <= this.items[index].priority) break;
                    this.swap(parent, index);
                    index = parent;
                }
            }
            dequeue() {
                if (this.isEmpty()) return null;
                const min = this.items[0];
                const end = this.items.pop();
                this.elementToIndex.delete(min.element);
                if (this.items.length > 0) {
                    this.items[0] = end;
                    this.elementToIndex.set(end.element, 0);
                    this.sinkDown(0);
                }
                return min;
            }
            sinkDown(index) {
                const length = this.items.length;
                while (true) {
                    let minIndex = index;
                    const left = 2 * index + 1;
                    const right = 2 * index + 2;
                    if (left < length && this.items[left].priority < this.items[minIndex].priority) {
                        minIndex = left;
                    }
                    if (right < length && this.items[right].priority < this.items[minIndex].priority) {
                        minIndex = right;
                    }
                    if (minIndex === index) break;
                    this.swap(index, minIndex);
                    index = minIndex;
                }
            }
            swap(i, j) {
                this.elementToIndex.set(this.items[i].element, j);
                this.elementToIndex.set(this.items[j].element, i);
                [this.items[i], this.items[j]] = [this.items[j], this.items[i]];
            }
            updatePriority(element, priority) {
                const index = this.elementToIndex.get(element);
                if (index === undefined) return false;
                const oldPriority = this.items[index].priority;
                this.items[index].priority = priority;
                if (priority < oldPriority) {
                    this.bubbleUp(index);
                } else {
                    this.sinkDown(index);
                }
                return true;
            }
            isEmpty() {
                return this.items.length === 0;
            }
        }

        // Dijkstra
        function dijkstra(graph, start, end) {
            const distances = {};
            const previous = {};
            const visited = new Set();
            const queue = new PriorityQueue();

            for (const v in graph) {
                distances[v] = Infinity;
                previous[v] = null;
            }

            distances[start] = 0;
            queue.enqueue(start, 0);

            while (!queue.isEmpty()) {
                const { element: current } = queue.dequeue();

                if (visited.has(current)) continue;
                visited.add(current);

                if (current === end) {
                    const path = [];
                    let temp = end;
                    while (temp) {
                        path.push(temp);
                        temp = previous[temp];
                    }
                    return { distance: distances[end], path: path.reverse() };
                }

                for (const neighbor in graph[current].neighbors) {
                    const alt = distances[current] + graph[current].neighbors[neighbor];

                    if (alt < distances[neighbor]) {
                        distances[neighbor] = alt;
                        previous[neighbor] = current;

                        queue.enqueue(neighbor, alt); 
                    }
                }
            }

            return { distance: Infinity, path: [] };
        }

        // Bidirectional Dijkstra
        function bidirectionalDijkstra(graph, start, end) {
            if (!graph[start] || !graph[end]) {
                return { distance: Infinity, path: [] };
            }


            const distF = new Map();
            const distB = new Map();
            const prevF = new Map();
            const prevB = new Map();

            const pqF = new PriorityQueue();
            const pqB = new PriorityQueue();

            const visitedF = new Set();
            const visitedB = new Set();

            for (const v in graph) {
                distF.set(v, Infinity);
                distB.set(v, Infinity);
            }

            distF.set(start, 0);
            distB.set(end, 0);

            pqF.enqueue(start, 0);
            pqB.enqueue(end, 0);

            let best = Infinity;
            let meet = null;

            while (!pqF.isEmpty() && !pqB.isEmpty()) {

                // Forward 
                if (!pqF.isEmpty()) {
                    const { element: u } = pqF.dequeue();

                    if (visitedF.has(u)) continue;
                    visitedF.add(u);

                    if (visitedB.has(u)) {
                        const total = distF.get(u) + distB.get(u);
                        if (total < best) {
                            best = total;
                            meet = u;
                        }
                    }

                    for (const v in graph[u].neighbors) {
                        const alt = distF.get(u) + graph[u].neighbors[v];
                        if (alt < distF.get(v)) {
                            distF.set(v, alt);
                            prevF.set(v, u);
                            pqF.updatePriority(v, alt) || pqF.enqueue(v, alt);
                        }
                    }
                }

                // Backward 
                if (!pqB.isEmpty()) {
                    const { element: u } = pqB.dequeue();

                    if (visitedB.has(u)) continue;
                    visitedB.add(u);

                    if (visitedF.has(u)) {
                        const total = distF.get(u) + distB.get(u);
                        if (total < best) {
                            best = total;
                            meet = u;
                        }
                    }

                    for (const v in reverseGraphLocal[u]) {
                        const alt = distB.get(u) + reverseGraphLocal[u][v];
                        if (alt < distB.get(v)) {
                            distB.set(v, alt);
                            prevB.set(v, u);
                            pqB.updatePriority(v, alt) || pqB.enqueue(v, alt);
                        }
                    }
                }

                // Early Stop
                const minF = pqF.isEmpty() ? Infinity : pqF.items[0].priority;
                const minB = pqB.isEmpty() ? Infinity : pqB.items[0].priority;

                if (best < Infinity && minF + minB >= best) break;
            }

            if (meet === null) {
                return { distance: Infinity, path: [] };
            }

            // 重建路徑
            const pathF = [];
            let cur = meet;
            while (cur) {
                pathF.push(cur);
                cur = prevF.get(cur);
            }
            pathF.reverse();

            const pathB = [];
            cur = prevB.get(meet);
            while (cur) {
                pathB.push(cur);
                cur = prevB.get(cur);
            }

            return {
                distance: best,
                path: pathF.concat(pathB)
            };
        }

        //Astar
        const heuristicCache = new Map();
        function heuristic(graph, node, goal, useElevator) {
            const goalKey = goal + "_" + useElevator;
            let gMap = heuristicCache.get(goalKey);
            if (!gMap) {
                gMap = new Map();
                heuristicCache.set(goalKey, gMap);
            }

            if (gMap.has(node)) return gMap.get(node);

            const n = graph[node];
            const g = graph[goal];

            const dx = n.x - g.x;
            const dy = n.y - g.y;
            const dz = n.z - g.z;

            const horizontal = Math.abs(dx) + Math.abs(dy);
            const vertical = Math.abs(dz) * (useElevator ? 22 : 35);


            const value = horizontal * 2 + vertical;

            gMap.set(node, value);
            return value;
        }
        function aStar(graph, start, end, useElevator) {
            if (!graph[start] || !graph[end]) return { distance: Infinity, path: [] };

            const gScore = {};
            const previous = {};
            const closed = new Set();
            const queue = new PriorityQueue();

            for (const v in graph) {
                gScore[v] = Infinity;
            }

            gScore[start] = 0;
            queue.enqueue(start, 0);

            while (!queue.isEmpty()) {
                const { element: current } = queue.dequeue();

                if (closed.has(current)) continue;
                closed.add(current);

                if (current === end) {
                    const path = [];
                    let temp = end;
                    while (temp) {
                        path.push(temp);
                        temp = previous[temp];
                    }
                    return { distance: gScore[end], path: path.reverse() };
                }

                for (const neighbor in graph[current].neighbors) {
                    const weight = graph[current].neighbors[neighbor];
                    const tentative = gScore[current] + weight;

                    if (tentative < gScore[neighbor]) {
                        gScore[neighbor] = tentative;
                        previous[neighbor] = current;

                        const f = tentative + heuristic(graph, neighbor, end, useElevator);
                        
                        
                        queue.enqueue(neighbor, f);
                    }
                }
            }

            return { distance: Infinity, path: [] };
        }


        // Algorithm selector
        const algorithms = {
            bidirectionalDijkstra,
            dijkstra,
            aStar
        };

        async function findShortestPath() {
            const algorithm = algorithmSelect.value;
            const start = startSelect.value;
            const end = endSelect.value;
            const useElevator = useElevatorSelect.value;


            const selectedGraph = (useElevator === "yes") ? graph : noElevatorGraph;

            const optimizeCheckbox = document.getElementById("optimize-order");
            const optimize = optimizeCheckbox.checked;

            // 蒐集中繼站
            const waypointElements = document.getElementsByClassName("waypoint-select");
            let waypoints = [];
            for (let el of waypointElements) {
                if (el.value && el.value !== "" && !el.value.includes("選擇")) {
                    waypoints.push(el.value);
                }
            }

            if (optimize && waypoints.length > 5) {
                alert("❌ 自動排序功能限制最多 5 個中繼站");
                return;
            }

            document.getElementById("loading").style.display = "block";
            if (document.getElementById("resultArea")) document.getElementById("resultArea").style.display = "none";

            setTimeout(() => {
                let bestResult = null;
                let totalTime = 0;
                const runs = waypoints.length > 2 ? 600 : 3000;

                function calculateFullPath(pointList) {
                    let fullPath = [];
                    let totalDist = 0;
                    let currentNodes = [start, ...pointList, end];

                    for (let i = 0; i < currentNodes.length - 1; i++) {
                        let res = algorithms[algorithm](selectedGraph, currentNodes[i], currentNodes[i + 1]);
                        if (!res || res.distance === Infinity) {
                            return null;
                        }
                        if (i === 0) {
                            fullPath = [...res.path];
                        } else {
                            fullPath = [...fullPath, ...res.path.slice(1)];
                        }
                        totalDist += res.distance;
                    }
                    return { path: fullPath, distance: totalDist };
                }

                const getPermutations = (arr) => {
                    if (arr.length <= 1) return [arr];
                    let result = [];
                    for (let j = 0; j < arr.length; j++) {
                        const char = arr[j];
                        const remaining = arr.slice(0, j).concat(arr.slice(j + 1));
                        for (let p of getPermutations(remaining)) {
                            result.push([char, ...p]);
                        }
                    }
                    return result;
                };

                let ordersToTest = optimize && waypoints.length > 0 
                    ? getPermutations(waypoints) 
                    : [waypoints];

                const startTime = performance.now();

                for (let r = 0; r < runs; r++) {
                    let minD = Infinity;
                    for (let order of ordersToTest) {
                        let current = calculateFullPath(order);
                        if (current && current.distance < minD) {
                            minD = current.distance;
                            if (r === 0) bestResult = current;
                        }
                    }
                }

                const endTime = performance.now();
                totalTime = endTime - startTime;
                const avgTime = totalTime / runs;

                document.getElementById("loading").style.display = "none";

                if (bestResult && bestResult.distance !== Infinity) {
                    renderResult(bestResult, avgTime, runs);
                } else {
                    alert("❌ 無法找到完整路徑");
                }
            }, 10);
        }

            const optimizeCheckbox = document.getElementById("optimize-order");

            let count = waypointElements.length;

        function renderResult(result, avgTime, runs) {
            const resultArea = document.getElementById("resultArea");
            if(!resultArea) return;
            
            resultArea.style.display = "block";
            document.getElementById("res-distance").innerText = result.distance;

                }

        }
